{% extends "base.html" %}
{% block title %}Register - Arsenic Detection{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block content %}
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Register</h1>
      <p class="auth-subtitle">Create an account to use arsenic detection</p>
      <form method="post" class="auth-form">
        <div class="form-row">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" />
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com" />
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="4" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </div>
{% endblock %}
